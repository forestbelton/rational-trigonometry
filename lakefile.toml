name = "rational-trigonometry"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["RationalTrigonometry"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0-rc1"

[[lean_lib]]
name = "RationalTrigonometry"

# Development-only: the `polyrith` tactic (revived to call a local `sage`).
# Not in `defaultTargets`, so it is only built when explicitly requested
# (`lake build PolyrithLocal`) or imported from a scratch file while writing proofs.
[[lean_lib]]
name = "PolyrithLocal"
